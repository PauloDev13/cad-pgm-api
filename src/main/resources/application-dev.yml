spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
api:
  security:
    token:
      secret: ${JWT_SECRET}
app:
  frontend:
    urls: ${FRONTEND_URLS:http://localhost:4200}
minio:
  # O Spring Boot vai "puxar" os valores que o Docker Compose injetou nele!
  url: ${MINIO_URL}
  public-url: ${MINIO_PUBLIC_URL}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  # O nome do bucket pode ser fixo, ou você pode criar um documentos-rh-prod se quiser separar
  bucket-name: documentos-rh

server:
  port: 8081
  address: 127.0.0.1