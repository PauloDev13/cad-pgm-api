spring:
  application:
    name: cad_pgm-api
  datasource:
    url: jdbc:mariadb://localhost:3306/cad_serv_pgm_db
    username: root
    password: password
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate # 'none' ou 'validate' para produńŃo
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect
