spring:
  application:
    name: cad_pgm-api
  datasource:
    url: jdbc:mariadb://localhost:3306/cad_serv_pgm_db
    username: root
    password: root
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate # Desligamos a criação automática do Hibernate! O chefe agora é o Flyway.
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1 # Diz que a linha de base empata com o nosso arquivo V1
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD} # Vai buscar a senha nas variáveis de ambiente do Windows/Linux/Docker
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
api:
  security:
    token:
      secret: ${JWT_SECRET}

